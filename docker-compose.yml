version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: consorcio_db
    environment:
      POSTGRES_USER: consorcio_admin
      POSTGRES_PASSWORD: consorcio_password
      POSTGRES_DB: consorcio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
